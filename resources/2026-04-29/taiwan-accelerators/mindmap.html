# 台灣創業加速器全景

## 民間加速器
### AppWorks（之初）
- 東南亞最大 Alumni 網
- 半年計畫 不投資也可進
- 主題：AI / IoT / Web3
- Alumni：Pinkoi、KKday、iKala、Lalamove
- Jamie Lin 創辦
### SparkLabs Taipei
- 韓資 SparkLabs 集團
- 3 個月密集 mentoring
- 每屆 8-10 隊
- 主題：B2B SaaS / FinTech / 健康
- 投資 NT$150-300 萬，佔股 5-8%

## 學界加速器
### 台大創創 NTUTEC
- 台大產學合作
- 5 個月企業導師制
- 階段：Pre-Series A
- 條件：成立 7 年內 + functional prototype

## 非營利
### Garage+（時代基金會）
- 1991 創立
- MIT / UC Berkeley 長期合作
- 480+ 團隊（含 244 國際）
- 主題：AI / 智慧裝置 / 數位醫療
- 利他導向

## 公部門
### 林口新創園 Startup Terrace
- 經濟部中小企業處
- 條件：資本 1 億 / 員工 200 / 5 年內
- 三選一：共享 / 獨立 / 住宿
### Taiwan Tech Arena (TTA)
- 國科會主導
- 出海導向（CES、Web Summit）
- 2026 加速器合作專案截止 1/19
- 位於台北小巨蛋
### Startup@Taipei
- 台北市產發局
- 補助最高 NT$200 萬
- 四類補助：研發 / 品牌 / 育成 / 創業

## 企業加速器
### StarFab
- 2016 創立
- 800+ 新創 / NT$54 億募資 / 88% 存活率
- 六大主題
  - 智慧製造
  - 智慧健康
  - 智慧城市
  - 智慧零售
  - 智慧農業
  - 智慧 FinTech

## 三維度交叉分析
### 維度 A：盤點
- 主辦方類型
- 主推產業
- 創辦背景
### 維度 B：比較表
- 投資金額（NT$）
- 佔股 %
- 適合階段
- Demo Day 規模
- 過往 Alumni
### 維度 C：實戰建議
- 適合什麼團隊
- 申請策略
- 面試題目
- 避雷指南

## 申請 5 步驟
### 1. 定位階段
- 題目 / 團隊 / 進度 / 6 月內目標
### 2. 挑 2-3 家深挖 Alumni
- LinkedIn 找畢業團隊
- 發訊息問前後差別
- 比看官網有用 10 倍
### 3. 看條款不看品牌
- SAFE / Convertible Note？
- Pro-rata 權利？
- 強制接特定 VC？
### 4. 申請文件
- BP 10-15 頁
- Pitch Deck 10 頁
- Demo 影片 3 分鐘
### 5. 面試演練
- Why you（為什麼是你）
- Why now（為什麼現在）
- What's the bet（6 月內怎麼證明）

## 進階玩法
### 跨加速器接力
- 公部門 → 民間 → 企業 三段組合
### Demo Day 攻略
- Demo Day 後一週黃金期
- 主動發 5-10 封 follow-up
### Alumni 變現
- 同屆當第一批付費客戶
- 轉換率比冷信高 30 倍
### TTA 出海
- 一年 3 次國際展會
- 比自己飛便宜 80%
### 補助 + 進駐並行
- 同時申請 SBIR / Startup@Taipei
- 不衝突，可加總 NT$1000 萬
### Mentor 開門
- Mentor 不是來教操作細節
- 是來開通訊錄裡的 200 個人
- 每次只問：你會推薦我去找誰

## 5 大踩坑
### ❌ 為品牌進大牌
- ✅ 看 Alumni 題目相似度
### ❌ 沒看條款就簽
- ✅ NT$3000 律師費省 10 年麻煩
### ❌ Demo Day 當記者會
- ✅ 一週內主動 follow-up
### ❌ 同屆當對手
- ✅ 同屆是付費客戶 / 推薦池
### ❌ 進駐後不離開
- ✅ 前 6 月最有用，吸乾後走
