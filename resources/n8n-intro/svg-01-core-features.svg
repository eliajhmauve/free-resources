<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <title>n8n 5 大核心功能圖示集：工作流自動化、400+應用串接、AI Agent 整合、Webhook 即時觸發、自架伺服器</title>
  <rect width="1200" height="400" fill="#FAFAF9"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="22" font-weight="700" fill="#1C1917">n8n 5 大核心功能</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" fill="#78716C">一張圖看懂 n8n 能幫你做什麼</text>

  <!-- Icon 1: 工作流自動化 -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <g transform="translate(50, 40)" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="10" cy="10" r="8" fill="#F59E0B"/>
      <circle cx="50" cy="10" r="8" fill="#F59E0B"/>
      <circle cx="30" cy="50" r="8" fill="#F59E0B"/>
      <line x1="18" y1="10" x2="42" y2="10"/>
      <line x1="14" y1="18" x2="26" y2="42"/>
      <line x1="46" y1="18" x2="34" y2="42"/>
    </g>
    <text x="80" y="130" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">工作流自動化</text>
    <text x="80" y="148" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">拖拉節點即完成</text>
  </g>

  <!-- Icon 2: 400+ 應用串接 -->
  <g transform="translate(300, 140)">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
    <g transform="translate(50, 40)" fill="#0D9488">
      <circle cx="30" cy="30" r="10" fill="#14B8A6"/>
      <circle cx="8" cy="12" r="6"/>
      <circle cx="52" cy="12" r="6"/>
      <circle cx="8" cy="48" r="6"/>
      <circle cx="52" cy="48" r="6"/>
      <g stroke="#0D9488" stroke-width="2" fill="none">
        <line x1="14" y1="16" x2="22" y2="24"/>
        <line x1="46" y1="16" x2="38" y2="24"/>
        <line x1="14" y1="44" x2="22" y2="36"/>
        <line x1="46" y1="44" x2="38" y2="36"/>
      </g>
    </g>
    <text x="80" y="130" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">400+ 應用串接</text>
    <text x="80" y="148" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">社群總計 1,200+</text>
  </g>

  <!-- Icon 3: AI Agent 整合 -->
  <g transform="translate(480, 140)">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <g transform="translate(50, 40)" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="10" y="10" width="40" height="40" rx="8" fill="#FEF3C7"/>
      <circle cx="22" cy="26" r="2.5" fill="#D97706"/>
      <circle cx="38" cy="26" r="2.5" fill="#D97706"/>
      <path d="M22 38 Q30 44 38 38" stroke-width="2"/>
      <line x1="30" y1="2" x2="30" y2="10"/>
      <circle cx="30" cy="2" r="2" fill="#D97706"/>
    </g>
    <text x="80" y="130" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">AI Agent 整合</text>
    <text x="80" y="148" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">原生 LangChain 支援</text>
  </g>

  <!-- Icon 4: Webhook 即時觸發 -->
  <g transform="translate(660, 140)">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
    <g transform="translate(50, 40)" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M10 30 L22 30 L26 20 L34 40 L38 30 L50 30" stroke="#14B8A6" stroke-width="3"/>
      <circle cx="10" cy="30" r="3" fill="#0D9488"/>
      <circle cx="50" cy="30" r="3" fill="#0D9488"/>
      <path d="M15 12 L15 8 M45 12 L45 8 M30 8 L30 4" stroke="#F59E0B" stroke-width="2"/>
    </g>
    <text x="80" y="130" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">Webhook 即時觸發</text>
    <text x="80" y="148" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">事件到執行 &lt; 3 秒</text>
  </g>

  <!-- Icon 5: 自架伺服器 -->
  <g transform="translate(840, 140)">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="#FAFAF9" stroke="#78716C" stroke-width="2"/>
    <g transform="translate(50, 40)" stroke="#57534E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="10" y="10" width="40" height="14" rx="3" fill="#E7E5E4"/>
      <rect x="10" y="28" width="40" height="14" rx="3" fill="#E7E5E4"/>
      <circle cx="16" cy="17" r="1.5" fill="#10B981"/>
      <circle cx="16" cy="35" r="1.5" fill="#10B981"/>
      <rect x="22" y="48" width="16" height="8" rx="2" fill="#F59E0B" stroke="#D97706"/>
    </g>
    <text x="80" y="130" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">自架伺服器</text>
    <text x="80" y="148" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">資料留在自己手上</text>
  </g>

  <!-- Icon 6: n8n Logo Mark (真實 logo：3 小圓水平 + 分叉到 2 大圓) -->
  <g transform="translate(1020, 140)">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="#1C1917"/>
    <g transform="translate(36, 38)" fill="#1C1917" stroke="#EA4B71" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- 連接管（先畫，被圓覆蓋視覺層次）-->
      <line x1="14" y1="34" x2="26" y2="34" stroke-width="5"/>
      <line x1="34" y1="34" x2="46" y2="34" stroke-width="5"/>
      <path d="M53 31 Q62 22 70 16" fill="none" stroke-width="5"/>
      <path d="M53 37 Q62 48 70 54" fill="none" stroke-width="5"/>
      <!-- 3 個小圓水平 -->
      <circle cx="10" cy="34" r="6"/>
      <circle cx="30" cy="34" r="6"/>
      <circle cx="50" cy="34" r="6"/>
      <!-- 2 個大圓分叉（右上 + 右下） -->
      <circle cx="74" cy="14" r="9"/>
      <circle cx="74" cy="54" r="9"/>
    </g>
    <text x="80" y="130" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="14" font-weight="700" fill="#FAFAF9">n8n</text>
    <text x="80" y="148" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#A8A29E">開源節點式自動化</text>
  </g>

  <text x="60" y="385" font-family="Inter, sans-serif" font-size="9" fill="#A8A29E" opacity="0.6">@elijah.shi.sensei</text>
</svg>
