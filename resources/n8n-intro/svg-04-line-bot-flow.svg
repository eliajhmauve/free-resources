<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none">
  <title>n8n LINE Bot 5 步客服機器人流程：客戶在 LINE 傳訊，經過 Webhook 送到 n8n 判斷訊息類型，丟給 ChatGPT 或 Claude 處理，再用 LINE API 回傳給客戶，全程不到 3 秒</title>
  <rect width="1200" height="440" fill="#FAFAF9"/>

  <!-- Title -->
  <text x="60" y="46" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="22" font-weight="700" fill="#1C1917">n8n + LINE Bot：5 步建出 AI 客服</text>
  <text x="60" y="72" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" fill="#78716C">客戶在 LINE 發問到收到 AI 回覆，整個過程不到 3 秒</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#78716C"/>
    </marker>
  </defs>

  <!-- Step 1: 客戶 LINE 傳訊 -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="170" height="140" rx="12" fill="white" stroke="#06C755" stroke-width="2.5"/>
    <circle cx="85" cy="40" r="24" fill="#06C755"/>
    <text x="85" y="47" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="white">L</text>
    <text x="85" y="88" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="14" font-weight="700" fill="#1C1917">客戶傳訊</text>
    <text x="85" y="108" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">在 LINE 上</text>
    <text x="85" y="124" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">發問 / 傳圖</text>
    <!-- Step number badge -->
    <circle cx="20" cy="20" r="14" fill="#06C755"/>
    <text x="20" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">1</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="200" x2="280" y2="200" stroke="#78716C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: LINE Webhook -->
  <g transform="translate(290, 130)">
    <rect x="0" y="0" width="170" height="140" rx="12" fill="white" stroke="#0D9488" stroke-width="2.5"/>
    <g transform="translate(65, 25)" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M5 20 L15 20 L18 12 L24 28 L27 20 L37 20" stroke="#14B8A6" stroke-width="3"/>
      <circle cx="5" cy="20" r="3" fill="#0D9488"/>
      <circle cx="37" cy="20" r="3" fill="#0D9488"/>
    </g>
    <text x="85" y="88" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="14" font-weight="700" fill="#1C1917">LINE Webhook</text>
    <text x="85" y="108" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">即時推送</text>
    <text x="85" y="124" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">訊息到 n8n</text>
    <circle cx="20" cy="20" r="14" fill="#0D9488"/>
    <text x="20" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">2</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="470" y1="200" x2="510" y2="200" stroke="#78716C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: n8n 判斷 -->
  <g transform="translate(520, 130)">
    <rect x="0" y="0" width="170" height="140" rx="12" fill="white" stroke="#F59E0B" stroke-width="2.5"/>
    <g transform="translate(55, 18)" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" fill="none">
      <circle cx="10" cy="10" r="7" fill="#F59E0B"/>
      <circle cx="50" cy="10" r="7" fill="#F59E0B"/>
      <circle cx="30" cy="42" r="7" fill="#F59E0B"/>
      <line x1="16" y1="10" x2="44" y2="10"/>
      <line x1="13" y1="16" x2="26" y2="36"/>
      <line x1="47" y1="16" x2="34" y2="36"/>
    </g>
    <text x="85" y="88" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="14" font-weight="700" fill="#1C1917">n8n 判斷</text>
    <text x="85" y="108" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">訊息類型</text>
    <text x="85" y="124" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">文字 / 圖片 / 位置</text>
    <circle cx="20" cy="20" r="14" fill="#F59E0B"/>
    <text x="20" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">3</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="700" y1="200" x2="740" y2="200" stroke="#78716C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: LLM 處理 -->
  <g transform="translate(750, 130)">
    <rect x="0" y="0" width="170" height="140" rx="12" fill="white" stroke="#78716C" stroke-width="2.5"/>
    <g transform="translate(60, 16)">
      <rect x="0" y="0" width="50" height="46" rx="10" fill="#F5F5F4" stroke="#57534E" stroke-width="2"/>
      <circle cx="17" cy="20" r="3" fill="#57534E"/>
      <circle cx="33" cy="20" r="3" fill="#57534E"/>
      <path d="M17 32 Q25 38 33 32" stroke="#57534E" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="25" y1="-6" x2="25" y2="0" stroke="#57534E" stroke-width="2"/>
      <circle cx="25" cy="-8" r="2" fill="#F59E0B"/>
    </g>
    <text x="85" y="88" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="14" font-weight="700" fill="#1C1917">LLM 處理</text>
    <text x="85" y="108" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">ChatGPT / Claude</text>
    <text x="85" y="124" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">產生回覆</text>
    <circle cx="20" cy="20" r="14" fill="#78716C"/>
    <text x="20" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">4</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="930" y1="200" x2="970" y2="200" stroke="#78716C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: LINE 回傳 -->
  <g transform="translate(980, 130)">
    <rect x="0" y="0" width="170" height="140" rx="12" fill="white" stroke="#06C755" stroke-width="2.5"/>
    <g transform="translate(56, 18)">
      <circle cx="30" cy="22" r="22" fill="#06C755"/>
      <path d="M22 22 L28 28 L40 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="85" y="88" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="14" font-weight="700" fill="#1C1917">LINE 回傳</text>
    <text x="85" y="108" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">送回給客戶</text>
    <text x="85" y="124" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">AI 自動回覆</text>
    <circle cx="20" cy="20" r="14" fill="#06C755"/>
    <text x="20" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">5</text>
  </g>

  <!-- Timing callout -->
  <g transform="translate(420, 310)">
    <rect x="0" y="0" width="360" height="56" rx="28" fill="#0D9488"/>
    <g transform="translate(28, 18)" stroke="white" stroke-width="2.5" fill="none">
      <circle cx="10" cy="10" r="10"/>
      <path d="M10 4 L10 10 L14 12" stroke-linecap="round"/>
    </g>
    <text x="80" y="35" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="18" font-weight="700" fill="white">整段流程 &lt; 3 秒完成</text>
  </g>

  <text x="1140" y="425" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#A8A29E" opacity="0.6">@elijah.shi.sensei</text>
</svg>
