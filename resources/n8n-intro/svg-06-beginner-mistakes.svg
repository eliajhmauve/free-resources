<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" fill="none">
  <title>n8n 新手常犯 5 個錯誤警示：沒做錯誤處理、API Key 寫死在節點、建 50 個節點的超複雜工作流、不用變數把資料寫死、只備份工作流 JSON 忘記備份 Encryption Key</title>
  <rect width="1200" height="460" fill="#FAFAF9"/>

  <text x="60" y="46" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="22" font-weight="700" fill="#1C1917">新手最容易踩的 5 個坑</text>
  <text x="60" y="72" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" fill="#78716C">分析社群 6,000+ 個公開工作流，整理出最常見的致命錯誤</text>

  <!-- Card 1: 沒做錯誤處理 -->
  <g transform="translate(35, 110)">
    <rect x="0" y="0" width="210" height="300" rx="12" fill="white" stroke="#FECACA" stroke-width="2"/>
    <!-- Number badge -->
    <circle cx="28" cy="28" r="18" fill="#F43F5E"/>
    <text x="28" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="white">1</text>
    <!-- Warning icon -->
    <g transform="translate(80, 70)">
      <circle cx="25" cy="25" r="25" fill="#FEE2E2"/>
      <g stroke="#E11D48" stroke-width="3" stroke-linecap="round" fill="none">
        <path d="M15 18 L18 32 M35 18 L32 32" stroke-width="2.5"/>
        <circle cx="25" cy="25" r="14"/>
        <line x1="25" y1="18" x2="25" y2="26"/>
        <circle cx="25" cy="31" r="1.5" fill="#E11D48"/>
      </g>
    </g>
    <text x="105" y="170" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#1C1917">沒做錯誤處理</text>
    <text x="105" y="210" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">API 延遲或憑證過期</text>
    <text x="105" y="228" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">時直接崩潰，還不知道</text>
    <rect x="20" y="256" width="170" height="28" rx="6" fill="#FEF2F2"/>
    <text x="105" y="275" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" font-weight="600" fill="#E11D48">→ 用 Error Trigger</text>
  </g>

  <!-- Card 2: API Key 寫死 -->
  <g transform="translate(265, 110)">
    <rect x="0" y="0" width="210" height="300" rx="12" fill="white" stroke="#FECACA" stroke-width="2"/>
    <circle cx="28" cy="28" r="18" fill="#F43F5E"/>
    <text x="28" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="white">2</text>
    <g transform="translate(80, 70)">
      <circle cx="25" cy="25" r="25" fill="#FEE2E2"/>
      <g stroke="#E11D48" stroke-width="2.5" stroke-linecap="round" fill="none">
        <rect x="14" y="22" width="22" height="16" rx="2"/>
        <path d="M18 22 L18 16 Q18 10 25 10 Q32 10 32 16 L32 22"/>
        <circle cx="25" cy="30" r="2" fill="#E11D48"/>
      </g>
    </g>
    <text x="105" y="170" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#1C1917">API Key 寫死</text>
    <text x="105" y="210" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">工作流匯出或分享時</text>
    <text x="105" y="228" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">密鑰一起外洩</text>
    <rect x="20" y="256" width="170" height="28" rx="6" fill="#FEF2F2"/>
    <text x="105" y="275" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" font-weight="600" fill="#E11D48">→ 用 Credentials 系統</text>
  </g>

  <!-- Card 3: 義大利麵工作流 -->
  <g transform="translate(495, 110)">
    <rect x="0" y="0" width="210" height="300" rx="12" fill="white" stroke="#FECACA" stroke-width="2"/>
    <circle cx="28" cy="28" r="18" fill="#F43F5E"/>
    <text x="28" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="white">3</text>
    <g transform="translate(80, 70)">
      <circle cx="25" cy="25" r="25" fill="#FEE2E2"/>
      <g stroke="#E11D48" stroke-width="2" stroke-linecap="round" fill="none">
        <circle cx="12" cy="14" r="3" fill="#E11D48"/>
        <circle cx="25" cy="10" r="3" fill="#E11D48"/>
        <circle cx="38" cy="14" r="3" fill="#E11D48"/>
        <circle cx="18" cy="28" r="3" fill="#E11D48"/>
        <circle cx="32" cy="28" r="3" fill="#E11D48"/>
        <circle cx="12" cy="40" r="3" fill="#E11D48"/>
        <circle cx="25" cy="42" r="3" fill="#E11D48"/>
        <circle cx="38" cy="38" r="3" fill="#E11D48"/>
        <path d="M12 14 Q20 18 25 28 Q30 18 38 14 M12 40 Q25 20 38 38 M18 28 Q25 35 32 28" opacity="0.5"/>
      </g>
    </g>
    <text x="105" y="170" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#1C1917">50+ 節點義大利麵</text>
    <text x="105" y="210" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">一個錯誤整條鏈斷掉</text>
    <text x="105" y="228" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">debug 花好幾小時</text>
    <rect x="20" y="256" width="170" height="28" rx="6" fill="#FEF2F2"/>
    <text x="105" y="275" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" font-weight="600" fill="#E11D48">→ 拆成子工作流</text>
  </g>

  <!-- Card 4: 不用變數 -->
  <g transform="translate(725, 110)">
    <rect x="0" y="0" width="210" height="300" rx="12" fill="white" stroke="#FECACA" stroke-width="2"/>
    <circle cx="28" cy="28" r="18" fill="#F43F5E"/>
    <text x="28" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="white">4</text>
    <g transform="translate(80, 70)">
      <circle cx="25" cy="25" r="25" fill="#FEE2E2"/>
      <g stroke="#E11D48" stroke-width="2.5" stroke-linecap="round" fill="none">
        <rect x="14" y="14" width="22" height="22" rx="3"/>
        <line x1="18" y1="20" x2="32" y2="20"/>
        <line x1="18" y1="26" x2="30" y2="26"/>
        <line x1="18" y1="32" x2="28" y2="32"/>
      </g>
    </g>
    <text x="105" y="170" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#1C1917">資料寫死不用變數</text>
    <text x="105" y="210" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">後續每個節點都要寫</text>
    <text x="105" y="228" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">複雜 expression 處理</text>
    <rect x="20" y="256" width="170" height="28" rx="6" fill="#FEF2F2"/>
    <text x="105" y="275" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" font-weight="600" fill="#E11D48">→ 早期 Set 節點整理</text>
  </g>

  <!-- Card 5: Encryption Key -->
  <g transform="translate(955, 110)">
    <rect x="0" y="0" width="210" height="300" rx="12" fill="white" stroke="#FECACA" stroke-width="2"/>
    <circle cx="28" cy="28" r="18" fill="#F43F5E"/>
    <text x="28" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="white">5</text>
    <g transform="translate(80, 70)">
      <circle cx="25" cy="25" r="25" fill="#FEE2E2"/>
      <g stroke="#E11D48" stroke-width="2.5" stroke-linecap="round" fill="none">
        <circle cx="20" cy="25" r="6"/>
        <line x1="26" y1="25" x2="38" y2="25"/>
        <line x1="34" y1="25" x2="34" y2="30"/>
        <line x1="38" y1="25" x2="38" y2="28"/>
        <path d="M10 40 L15 35 M10 35 L15 40" stroke-width="2"/>
      </g>
    </g>
    <text x="105" y="170" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#1C1917">忘備份 Encryption</text>
    <text x="105" y="210" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">換伺服器後所有憑證</text>
    <text x="105" y="228" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">全部無法解密</text>
    <rect x="20" y="256" width="170" height="28" rx="6" fill="#FEF2F2"/>
    <text x="105" y="275" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" font-weight="600" fill="#E11D48">→ 5 樣東西都要備</text>
  </g>

  <text x="1165" y="445" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#A8A29E" opacity="0.6">資料：DEV Community 2025 分析 · @elijah.shi.sensei</text>
</svg>
