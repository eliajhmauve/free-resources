<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <title>n8n vs Zapier vs Make 月費對比柱狀圖：10 步驟工作流每天 50 次執行，n8n 自架月費僅 5 美元，Zapier Team 方案月費高達 103.5 美元</title>
  <rect width="800" height="600" fill="#FAFAF9"/>

  <!-- Title -->
  <text x="60" y="46" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="22" font-weight="700" fill="#1C1917">月費直接差 20 倍</text>
  <text x="60" y="72" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" fill="#78716C">以「10 步驟工作流 × 每天跑 50 次」為例，4 個平台的每月花費（USD）</text>

  <!-- Y-axis grid lines -->
  <line x1="100" y1="130" x2="740" y2="130" stroke="#E7E5E4" stroke-width="1"/>
  <line x1="100" y1="230" x2="740" y2="230" stroke="#E7E5E4" stroke-width="1"/>
  <line x1="100" y1="330" x2="740" y2="330" stroke="#E7E5E4" stroke-width="1"/>
  <line x1="100" y1="430" x2="740" y2="430" stroke="#E7E5E4" stroke-width="1"/>
  <line x1="100" y1="530" x2="740" y2="530" stroke="#78716C" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="90" y="135" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#78716C">$120</text>
  <text x="90" y="235" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#78716C">$90</text>
  <text x="90" y="335" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#78716C">$60</text>
  <text x="90" y="435" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#78716C">$30</text>
  <text x="90" y="535" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#78716C">$0</text>

  <!-- Bar 1: Zapier Team - $103.50 -->
  <rect x="140" y="185" width="100" height="345" rx="4" fill="#F43F5E"/>
  <text x="190" y="175" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#1C1917">$103.50</text>
  <text x="190" y="555" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">Zapier</text>
  <text x="190" y="573" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">Team 方案</text>

  <!-- Bar 2: Make Pro - $29 -->
  <rect x="300" y="433" width="100" height="97" rx="4" fill="#78716C"/>
  <text x="350" y="423" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#1C1917">$29</text>
  <text x="350" y="555" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">Make</text>
  <text x="350" y="573" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">Pro 方案</text>

  <!-- Bar 3: n8n Cloud Starter - $22 (€20) -->
  <rect x="460" y="457" width="100" height="73" rx="4" fill="#F59E0B"/>
  <text x="510" y="447" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#1C1917">$22</text>
  <text x="510" y="555" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">n8n Cloud</text>
  <text x="510" y="573" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">Starter 方案</text>

  <!-- Bar 4: n8n 自架 - $5 -->
  <rect x="620" y="513" width="100" height="17" rx="4" fill="#0D9488"/>
  <text x="670" y="503" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#0D9488">$5</text>
  <text x="670" y="555" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#1C1917">n8n 自架</text>
  <text x="670" y="573" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="11" fill="#78716C">VPS / Zeabur</text>

  <!-- Highlight callout for cheapest -->
  <g transform="translate(640, 490)">
    <polygon points="0,10 10,0 20,10" fill="#0D9488"/>
    <rect x="-40" y="-20" width="100" height="30" rx="6" fill="#0D9488"/>
    <text x="10" y="0" text-anchor="middle" font-family="Inter, 'Noto Sans TC', sans-serif" font-size="12" font-weight="700" fill="white">最省 95%</text>
  </g>

  <!-- Source -->
  <text x="740" y="595" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#A8A29E" opacity="0.6">資料：各平台官方定價（2026）· @elijah.shi.sensei</text>
</svg>
