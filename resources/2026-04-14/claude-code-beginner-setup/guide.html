<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 新手設定指南 — 5 分鐘從零開始</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
  background: #fafafa;
  color: #2a2a2a;
  line-height: 1.6;
  min-height: 100vh;
}

.brand-bar {
  background: #1a1a1a;
  color: #f5f5f5;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand-bar a { color: #f5f5f5; text-decoration: none; font-weight: 600; letter-spacing: 1px; }
.brand-bar a:hover { color: #e0c96e; }
.brand-bar .tag {
  background: #e0c96e;
  color: #1a1a1a;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
}

.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 20px 60px;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.3;
}
.subtitle {
  color: #666;
  font-size: 15px;
  margin-bottom: 12px;
}

/* Progress */
.progress-wrapper {
  margin-bottom: 36px;
}
.progress-track {
  height: 6px;
  background: #e8e8e8;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #2a2a2a;
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-label {
  font-size: 13px;
  color: #999;
  margin-top: 6px;
  text-align: right;
}

/* Step card */
.step {
  background: #fff;
  border-radius: 16px;
  margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.step.active { box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
.step.done { opacity: 0.7; }
.step.done .step-header { background: #f0f0f0; }

.step-header {
  display: flex;
  align-items: center;
  padding: 18px 24px;
  cursor: pointer;
  gap: 14px;
  transition: background 0.2s;
  user-select: none;
}
.step-header:hover { background: #f8f8f8; }

.step-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.3s;
}
.step.active .step-num { background: #2a2a2a; color: #fff; }
.step.done .step-num { background: #4caf50; color: #fff; }
.step.done .step-num::after { content: '\2713'; }
.step.done .step-num span { display: none; }

.step-title {
  font-size: 17px;
  font-weight: 600;
  flex: 1;
}
.step-time {
  font-size: 12px;
  color: #aaa;
  flex-shrink: 0;
}

.step-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.step.active .step-body { max-height: 800px; }

.step-content {
  padding: 0 24px 24px;
  padding-left: 70px;
}
.step-content p {
  font-size: 15px;
  color: #555;
  margin-bottom: 14px;
  line-height: 1.7;
}
.step-content .why {
  font-size: 14px;
  color: #888;
  border-left: 3px solid #e0c96e;
  padding-left: 12px;
  margin-bottom: 16px;
}

/* Code block */
.code-block {
  background: #1a1a1a;
  color: #e0e0e0;
  border-radius: 10px;
  padding: 16px 20px;
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 14px;
  overflow-x: auto;
  position: relative;
  white-space: pre-wrap;
  word-break: break-word;
}
.code-block .comment { color: #6a9955; }
.code-block .keyword { color: #e0c96e; }
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #333;
  color: #ccc;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
.copy-btn:hover { background: #444; }

/* Tip box */
.tip {
  background: #fffbe6;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  color: #6d5a00;
  margin-bottom: 14px;
}

/* Done button */
.done-btn {
  display: inline-block;
  background: #2a2a2a;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.done-btn:hover { background: #444; transform: translateY(-1px); }

/* Complete screen */
.complete {
  text-align: center;
  padding: 48px 24px;
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.complete .big-check {
  width: 72px;
  height: 72px;
  background: #4caf50;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: #fff;
  margin: 0 auto 20px;
}
.complete h2 {
  font-size: 24px;
  margin-bottom: 8px;
}
.complete p {
  font-size: 15px;
  color: #666;
  margin-bottom: 24px;
  line-height: 1.7;
}

/* Separator between steps */
.step-connector {
  width: 2px;
  height: 12px;
  background: #e0e0e0;
  margin: 0 auto;
}

/* CTA */
.bottom-cta {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 28px 32px;
  text-align: center;
  margin-top: 40px;
}
.bottom-cta p {
  color: #ccc;
  font-size: 14px;
  margin-bottom: 16px;
  line-height: 1.6;
}
.bottom-cta .cta-links {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.bottom-cta a {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: transform 0.15s;
}
.bottom-cta a:hover { transform: translateY(-1px); }
.btn-primary { background: #e0c96e; color: #1a1a1a; }
.btn-secondary { background: #333; color: #f0f0f0; border: 1px solid #444; }

.footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: #bbb;
}
.footer a { color: #888; text-decoration: none; }

@media (max-width: 600px) {
  .container { padding: 28px 16px 40px; }
  h1 { font-size: 24px; }
  .step-content { padding-left: 24px; }
  .step-header { padding: 14px 18px; }
  .bottom-cta { padding: 20px; }
  .bottom-cta .cta-links { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<div class="brand-bar">
  <a href="https://www.threads.net/@elijah.shi.sensei" target="_blank">Elijah Sensei</a>
  <span class="tag">FREE RESOURCE</span>
</div>

<div class="container">
  <h1>Claude Code 新手設定指南</h1>
  <p class="subtitle">不需要會寫程式，5 分鐘跟著做就能開始</p>

  <div class="progress-wrapper">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 5 完成</div>
  </div>

  <div id="steps"></div>
  <div id="complete" style="display:none"></div>

  <div class="bottom-cta">
    <p>想看更多非工程師用 Claude Code 做出東西的案例？</p>
    <div class="cta-links">
      <a href="https://www.threads.net/@elijah.shi.sensei" class="btn-primary" target="_blank">追蹤 Threads</a>
      <a href="https://resources.kevinmind.com" class="btn-secondary" target="_blank">更多免費資源</a>
    </div>
  </div>
</div>

<div class="footer">
  <a href="https://www.threads.net/@elijah.shi.sensei">&copy; 2026 Elijah Sensei</a>
</div>

<script>
const steps = [
  {
    title: '安裝 Claude Code',
    time: '1 分鐘',
    content: `
      <p>Claude Code 有三種安裝方式，選一個你最順手的：</p>
      <div class="tip">推薦新手用<strong>桌面版</strong>，打開就能用，不需要碰終端機</div>
      <p><strong>方法一：桌面版（推薦）</strong></p>
      <p>到 <strong>claude.ai/code</strong> 下載 Windows 或 Mac 桌面版，安裝後打開，登入你的 Claude 帳號就完成了。</p>
      <p><strong>方法二：VS Code 擴充套件</strong></p>
      <p>如果你有在用 VS Code，在擴充套件搜尋「Claude Code」安裝即可。</p>
      <p><strong>方法三：終端機（CLI）</strong></p>
      <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">複製</button><span class="comment"># 需要先裝 Node.js</span>
npm install -g @anthropic-ai/claude-code</div>
    `
  },
  {
    title: '建立你的專案資料夾',
    time: '30 秒',
    content: `
      <p>在桌面或任何你習慣的地方，建一個資料夾，這就是你的專案。</p>
      <p>名字隨便取，用中文也行：</p>
      <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">複製</button><span class="comment"># 範例：在桌面建一個資料夾</span>
我的第一個網站/
我的品牌官網/
自動化工具/</div>
      <p>然後在 Claude Code 裡打開這個資料夾。桌面版直接拖進去就好。</p>
      <div class="why">為什麼需要資料夾？Claude Code 會在這個資料夾裡幫你建檔案、寫程式碼。它只動這個資料夾裡的東西，不會亂改你電腦其他地方。</div>
    `
  },
  {
    title: '建立 CLAUDE.md — 最重要的一步',
    time: '2 分鐘',
    content: `
      <p>在專案資料夾裡建一個叫 <strong>CLAUDE.md</strong> 的檔案。</p>
      <p>這是你給 Claude 的「工作說明書」，告訴它你是誰、你要什麼、它該怎麼做事。</p>
      <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">複製</button><span class="comment"># CLAUDE.md — 複製貼上，改成你的</span>

<span class="keyword"># 我的專案</span>
用途：個人品牌官網

<span class="keyword"># 規則</span>
- 用繁體中文回應
- 不確定的事先問我，不要猜
- 風格簡潔、現代，不要花俏

<span class="keyword"># 技術</span>
- 我不會寫程式，請解釋你做了什麼
- 用最簡單的方式實作</div>
      <div class="tip">CLAUDE.md 沒有固定格式，用你自己的話寫就好。重點是讓 Claude 知道<strong>你要做什麼</strong>和<strong>你的限制是什麼</strong>。</div>
      <div class="why">有了 CLAUDE.md，Claude 每次開工前都會先讀這份文件。你不用每次重新解釋「我不會寫程式，請講人話」。</div>
    `
  },
  {
    title: '跟它說第一句話',
    time: '1 分鐘',
    content: `
      <p>打開 Claude Code，輸入你想做的事。用中文，講白話，就像跟同事講話一樣：</p>
      <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">複製</button><span class="comment"># 這些都是有效的指令：</span>

幫我建一個簡單的個人網站，有自我介紹和作品集

幫我做一個計算機，可以算房貸月付金額

幫我寫一個 Python 腳本，每天自動抓新聞標題</div>
      <p>它會開始動手做，邊做邊跟你說它在幹嘛。</p>
      <p>做出來不滿意？直接講：</p>
      <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">複製</button>按鈕太小了，放大一點
顏色太亮，換成深色系
這個功能不對，我要的是 XXX</div>
      <div class="why">Claude Code 的核心體驗就是「說人話 → 它動手」。你不需要知道它用了什麼技術，你只需要知道你要什麼。</div>
    `
  },
  {
    title: '學會三個救命指令',
    time: '30 秒',
    content: `
      <p>新手最常遇到的三種情況，對應三句話：</p>
      <div class="code-block"><button class="copy-btn" onclick="copyCode(this)">複製</button><span class="comment"># 1. 它做錯了</span>
不對，還原上一步

<span class="comment"># 2. 它做的東西你看不懂</span>
解釋一下你剛才做了什麼，講簡單一點

<span class="comment"># 3. 它卡住了</span>
換個方式試試看</div>
      <p>就這樣，你已經具備用 Claude Code 做事的所有基礎了。</p>
      <div class="tip">進階技巧：當你做出一個滿意的版本，跟它說「<strong>幫我 commit</strong>」。這就像遊戲存檔，以後搞砸了可以回到這個版本。</div>
    `
  }
];

let doneSteps = new Set();
let activeStep = 0;

function renderSteps() {
  const container = document.getElementById('steps');
  container.innerHTML = steps.map((s, i) => `
    <div class="step ${i === activeStep ? 'active' : ''} ${doneSteps.has(i) ? 'done' : ''}" id="step${i}">
      <div class="step-header" onclick="toggleStep(${i})">
        <div class="step-num"><span>${i + 1}</span></div>
        <div class="step-title">${s.title}</div>
        <div class="step-time">${s.time}</div>
      </div>
      <div class="step-body">
        <div class="step-content">
          ${s.content}
          <button class="done-btn" onclick="markDone(${i})">
            ${doneSteps.has(i) ? '已完成' : '做好了，下一步'}
          </button>
        </div>
      </div>
    </div>
    ${i < steps.length - 1 ? '<div class="step-connector"></div>' : ''}
  `).join('');
  updateProgress();
}

function toggleStep(i) {
  activeStep = activeStep === i ? -1 : i;
  renderSteps();
  if (activeStep >= 0) {
    setTimeout(() => {
      document.getElementById('step' + i).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
}

function markDone(i) {
  doneSteps.add(i);
  if (i < steps.length - 1) {
    activeStep = i + 1;
  } else {
    activeStep = -1;
    showComplete();
  }
  renderSteps();
  if (activeStep >= 0) {
    setTimeout(() => {
      document.getElementById('step' + activeStep).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 300);
  }
}

function updateProgress() {
  const pct = (doneSteps.size / steps.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = doneSteps.size + ' / ' + steps.length + ' 完成';
}

function showComplete() {
  document.getElementById('complete').style.display = 'block';
  document.getElementById('complete').innerHTML = `
    <div class="complete">
      <div class="big-check">\u2713</div>
      <h2>設定完成</h2>
      <p>你已經準備好用 Claude Code 做任何事了<br>
      不需要會寫程式，用打字的就行</p>
      <p style="font-size:14px;color:#999">
        接下來可以試試：<br>
        「幫我做一個 XXX」<br>
        「幫我改 XXX」<br>
        「幫我自動化 XXX」
      </p>
    </div>
  `;
  setTimeout(() => {
    document.getElementById('complete').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}

function copyCode(btn) {
  const block = btn.parentElement;
  const text = block.textContent.replace('複製', '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已複製';
    setTimeout(() => { btn.textContent = '複製'; }, 1500);
  });
}

renderSteps();
</script>
</body>
</html>
