# ChatHub

## 一句話定位
### 是什麼
- 一站式 AI 聊天工作台
- 把多個主流聊天機器人整合到同一介面
- 官網 chathub.gg
### 解決的核心問題
- 砍掉 80% 跨模型切換成本
- 取代每個月 NT$ 2200+ 的多訂閱
- 自備 API key 模式按用量計費

## 支援模型（8+）
### OpenAI 系列
- GPT-5.4
- GPT-5.4 nano
- GPT-5.4 Thinking
### Anthropic
- Claude Sonnet 4.6
### Google
- Gemini 3.1 Pro
### 中國模型
- DeepSeek V3.2 / V4 Pro
- Qwen 3.6 Plus
- Kimi K2.6
- GLM-5.1
- MiniMax M2.7

## 三大內建工具箱
### 1. 圖像生成器
- 喚最新 GPT Image 2
- 中文字精準渲染
- Basic / Advanced / Images 三層配額
### 2. AI 翻譯器
- 自動偵測來源語言
- 同步輸出 4 國語言
- 用 LLM 翻不是字典翻
- 結構標記不被翻爛
### 3. 網頁摘要器
- 貼 URL 進去
- 自動拆「核心功能/欄位/定位」三段
- 配多模型可交叉驗證

## 四個實戰場景
### 場景 1：6 模型並排對打
- 一次貼 prompt
- 6 個模型同步生成
- 從草稿挑段落組合
- 寫作速度快 3 倍
### 場景 2：電商海報生成
- GPT Image 2 中文渲染
- 「日式布丁」廣告主視覺
- 不用切到 Midjourney
### 場景 3：跨境多語翻譯
- 同一份文案
- 中英日韓法五版本
- 跨境電商必備
### 場景 4：競品官網摘要
- 研究 cama café 加盟
- 3 秒抓重點
- 不用逐頁讀

## 適合誰
### 強烈推薦
- 研究者：交叉驗證觀點
- 內容創作者：多語產出
- 行銷企劃：競品研究
- 跨境電商：文案+視覺+翻譯
### 也很適合
- 獨立開發者：除錯多模型對照
- 學生：學會比較式思考

## 不適合誰
### 不需要的人
- 只用一個模型（直接訂原廠）
- 完全 AI 新手（先從原廠 app 上手）
### 暫時別用
- 要立刻用原廠最新功能
- 第三方聚合會慢 1-2 個月

## 價格策略
### 三種模式
- 免費 tier：基礎功能 + 少量配額
- Premium 訂閱：解鎖進階能力
- 自備 API key：按用量計費最可預期
### 對比傳統訂閱
- GPT Plus $20
- Claude Pro $20
- Gemini Adv $20
- Kimi $10
- 加總 ≈ NT$ 2200/月
- ChatHub 可省 50-75%

## 部署方式
### Web 版
- 直接 chathub.gg 開
- 不用裝任何東西
### Chrome 擴充
- 整合進瀏覽器
- 隨時喚出側邊欄
### 資料儲存
- 本地儲存對話歷史
- 可標註管理
- 提示庫 + 模板
