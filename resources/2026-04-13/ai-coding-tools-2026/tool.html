<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 寫程式工具選擇器 — 找到你的最佳起步工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
  background: #fafafa;
  color: #2a2a2a;
  line-height: 1.6;
  min-height: 100vh;
}

/* Brand bar */
.brand-bar {
  background: #1a1a1a;
  color: #f5f5f5;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}
.brand-bar .name { font-weight: 600; letter-spacing: 1px; }
.brand-bar .tag {
  background: #e0c96e;
  color: #1a1a1a;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.3;
}
.subtitle {
  color: #666;
  font-size: 15px;
  margin-bottom: 40px;
}

/* Question card */
.question-card {
  background: #fff;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-number {
  font-size: 13px;
  color: #999;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.q-text {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 24px;
  line-height: 1.4;
}

.option {
  display: block;
  width: 100%;
  background: #f5f5f5;
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
  font-size: 16px;
  color: #2a2a2a;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  font-family: inherit;
}
.option:hover {
  background: #eee;
  border-color: #ddd;
}
.option:active {
  transform: scale(0.98);
}

/* Progress */
.progress-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 32px;
}
.progress-dot {
  width: 40px;
  height: 4px;
  border-radius: 2px;
  background: #e0e0e0;
  transition: background 0.3s;
}
.progress-dot.done { background: #2a2a2a; }
.progress-dot.current { background: #e0c96e; }

/* Result */
.result-card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 32px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  animation: fadeIn 0.4s ease;
}
.result-emoji {
  font-size: 48px;
  margin-bottom: 16px;
}
.result-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
}
.result-subtitle {
  font-size: 15px;
  color: #666;
  margin-bottom: 24px;
}
.result-section {
  margin-bottom: 24px;
}
.result-section h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #2a2a2a;
}
.step-list {
  list-style: none;
  counter-reset: step;
}
.step-list li {
  counter-increment: step;
  padding: 12px 16px 12px 48px;
  background: #f5f5f5;
  border-radius: 10px;
  margin-bottom: 8px;
  position: relative;
  font-size: 15px;
}
.step-list li::before {
  content: counter(step);
  position: absolute;
  left: 16px;
  top: 12px;
  width: 24px;
  height: 24px;
  background: #2a2a2a;
  color: #fff;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tool-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  margin-right: 8px;
  margin-bottom: 8px;
}
.tag-primary { background: #2a2a2a; color: #fff; }
.tag-secondary { background: #e8e8e8; color: #555; }
.tag-optional { background: #fff3cd; color: #856404; }

.restart-btn {
  display: block;
  width: 100%;
  background: #2a2a2a;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 24px;
  font-family: inherit;
  transition: background 0.2s;
}
.restart-btn:hover { background: #444; }

/* Footer CTA */
.footer-cta {
  text-align: center;
  margin-top: 40px;
  padding: 24px;
  background: #f0f0f0;
  border-radius: 12px;
}
.footer-cta p { font-size: 14px; color: #666; margin-bottom: 8px; }
.footer-cta a {
  color: #2a2a2a;
  font-weight: 600;
  text-decoration: none;
  border-bottom: 2px solid #e0c96e;
}
</style>
</head>
<body>

<div class="brand-bar">
  <span class="name">Elijah Sensei</span>
  <span class="tag">FREE RESOURCE</span>
</div>

<div class="container">
  <h1>AI 寫程式工具選擇器</h1>
  <p class="subtitle">回答 4 個問題，找到你現在該用的工具組合</p>
  <div id="app"></div>
  <div class="footer-cta">
    <p>更多 AI 工具教學和免費資源</p>
    <a href="https://www.threads.net/@elijah.shi.sensei" target="_blank">追蹤 @elijah.shi.sensei</a>
  </div>
</div>

<script>
const questions = [
  {
    text: '你現在會寫程式嗎？',
    options: [
      { text: '完全不會，零基礎', value: 'no' },
      { text: '會一點，能看懂但不太會寫', value: 'some' },
      { text: '會寫，日常有在開發', value: 'yes' }
    ]
  },
  {
    text: '你想用 AI 做什麼？',
    options: [
      { text: '做一個網站或小工具', value: 'build' },
      { text: '加速日常開發工作', value: 'speed' },
      { text: '自動化流程（抓資料、串 API）', value: 'auto' }
    ]
  },
  {
    text: '你的專案大概多大？',
    options: [
      { text: '還沒開始，想先試試', value: 'none' },
      { text: '小專案，10 個檔案以內', value: 'small' },
      { text: '中大型，超過 10 個檔案', value: 'big' }
    ]
  },
  {
    text: '你對「品質管控」的需求？',
    options: [
      { text: '能跑就好，之後再說', value: 'low' },
      { text: '希望有人幫我檢查一下', value: 'mid' },
      { text: '要確認安全性和效能', value: 'high' }
    ]
  }
];

let answers = [];
let currentQ = 0;

function render() {
  const app = document.getElementById('app');
  if (currentQ < questions.length) {
    renderQuestion(app);
  } else {
    renderResult(app);
  }
}

function renderQuestion(app) {
  const q = questions[currentQ];
  const dots = questions.map((_, i) => {
    const cls = i < currentQ ? 'done' : i === currentQ ? 'current' : '';
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');

  app.innerHTML = `
    <div class="question-card">
      <div class="progress-bar">${dots}</div>
      <div class="q-number">問題 ${currentQ + 1} / ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      ${q.options.map((opt, i) => `
        <button class="option" onclick="answer('${opt.value}')">${opt.text}</button>
      `).join('')}
    </div>
  `;
}

function answer(val) {
  answers.push(val);
  currentQ++;
  render();
}

function getResult() {
  const [coding, goal, size, quality] = answers;

  // Determine primary, secondary, tertiary tools
  let primary, secondary, tertiary;
  let profile, explanation, steps;

  if (coding === 'no') {
    primary = 'Claude Code';
    secondary = null;
    tertiary = null;
    profile = '零基礎新手';
    explanation = '你現在最需要的就是一個能幫你動手做事的工具。Claude Code 完全不需要程式基礎，用中文跟它說話就好。';
    steps = [
      '下載 Claude 桌面版，打開 Code tab',
      '在專案資料夾建 CLAUDE.md，寫你的規則',
      '跟它說「幫我做一個 XXX」，看它怎麼做',
      '做完 3 個小東西之後，再考慮要不要加 Cursor'
    ];
    if (quality === 'high') {
      tertiary = 'Codex';
    }
  } else if (coding === 'some') {
    primary = 'Claude Code';
    if (goal === 'speed') {
      secondary = 'Cursor';
      explanation = '你有基礎了，Claude Code 當引擎幫你做事，Cursor 當介面讓你即時看修改。兩個搭起來效率會比只用一個好很多。';
    } else {
      secondary = null;
      explanation = '你有一點基礎，先用 Claude Code 把做事的能力拉上來。等你做了幾個專案，再決定要不要加 Cursor 的介面。';
    }
    profile = '有基礎的學習者';
    steps = [
      '安裝 Claude Code（桌面版或終端機版都行）',
      '建 CLAUDE.md，寫清楚你的技術棧和規則',
      '讓它幫你做一個完整的小專案',
      secondary ? '裝 Cursor，用 Agent 模式體驗即時編輯' : '做完 2-3 個專案後再試 Cursor',
      size === 'big' || quality !== 'low' ? '專案變大後加 Codex 做品質把關' : '暫時不需要 Codex'
    ];
    if (size === 'big' || quality === 'high') {
      tertiary = 'Codex';
    }
  } else {
    // coding === 'yes'
    if (goal === 'speed') {
      primary = 'Cursor';
      secondary = 'Claude Code';
      explanation = 'Cursor 的介面整合對你這種已經在開發的人最有感。底層引擎就是 Claude Code，所以你也等於在用 Claude Code。兩個一起用最順。';
    } else {
      primary = 'Claude Code';
      secondary = 'Cursor';
      explanation = '你要做的事（自動化/建專案）Claude Code 直接動手做最快。Cursor 適合你在開發途中看程式碼和微調。';
    }
    profile = '有經驗的開發者';
    steps = [
      goal === 'speed' ? '裝 Cursor，直接用 Agent 模式開發' : '用 Claude Code 描述目標，讓它幫你建起來',
      '建 CLAUDE.md（Cursor 裡叫 AGENTS.md，內容一樣）',
      '讓 AI 處理重複性的工作，你專注在架構決策',
      '加 Codex 做程式碼審查，形成完整工作流'
    ];
    tertiary = 'Codex';
    if (quality === 'low' && size !== 'big') {
      tertiary = null;
    }
  }

  return { primary, secondary, tertiary, profile, explanation, steps };
}

function renderResult(app) {
  const r = getResult();

  const tags = [
    r.primary ? `<span class="tool-tag tag-primary">${r.primary} — 核心</span>` : '',
    r.secondary ? `<span class="tool-tag tag-secondary">${r.secondary} — 搭配</span>` : '',
    r.tertiary ? `<span class="tool-tag tag-optional">${r.tertiary} — 之後加</span>` : ''
  ].filter(Boolean).join('');

  const stepItems = r.steps.map(s => `<li>${s}</li>`).join('');

  app.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">🎯</div>
      <div class="result-title">你的工具組合</div>
      <div class="result-subtitle">${r.profile}</div>
      <div style="margin-bottom:20px">${tags}</div>
      <div class="result-section">
        <h3>為什麼這樣配</h3>
        <p style="font-size:15px;color:#444;line-height:1.7">${r.explanation}</p>
      </div>
      <div class="result-section">
        <h3>你的起步順序</h3>
        <ol class="step-list">${stepItems}</ol>
      </div>
      <button class="restart-btn" onclick="restart()">重新測一次</button>
    </div>
  `;
}

function restart() {
  answers = [];
  currentQ = 0;
  render();
}

render();
</script>
</body>
</html>
