# Claude 新手 5 大技巧

## 1. ICC 提問公式
### I - Instructions
- 你要 Claude 做什麼
- 動詞要具體（列清單/分析/比較）
### C - Context
- 你的角色、產業、目標
- 寧多勿少，全寫上去
### C - Constraints
- 字數、格式、語氣
- 附範例效果更好

## 2. Context Interview
### 怎麼用
- prompt 結尾加「先問我你需要的資訊」
- Claude 會反問 3 到 5 個問題
### 為什麼有用
- 你常常遺漏關鍵背景
- Claude 知道自己需要什麼
- 搭配 ICC 第一次就能用

## 3. Ground First, Ask Second
### 先研究
- 「幫我研究 XX 的最新方法」
- 讓 Claude 用 web search 更新知識
### 再提問
- 「根據你剛才的研究，幫我做 XX」
- 兩步比一步強 3 倍

## 4. Projects
### 取代全域 custom instructions
- 全域設定等於每道菜加一樣的醬
- Projects 等於每個情境一套設定
### 怎麼用
- 每個工作類型建一個 Project
- 上傳品牌指南、範例、SOP
- Claude 每次自動參考

## 5. Skills
### 最被低估的功能
- 把重複流程打包成一鍵觸發
- 從簡單兩步驟開始
### 進階玩法
- 多個 Skill 串成產線
- Projects 等於記憶，Skills 等於能力
