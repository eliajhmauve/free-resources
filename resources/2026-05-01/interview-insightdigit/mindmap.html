# 洞察數位科技 面試速成

## 1️⃣ 公司一頁速覽
### 基本資料
- 10 年經驗
- 400+ 案例
- 100+ 產業
- 隸屬集團（行銷 / 電商）
### 技術主張 ⭐
- 「coding 而非套版」
- 顧客行為 + 商業邏輯
- 智慧預約系統
### 核心團隊
- 各大公司出身
- 專案 / 業務 / 技術總監
### 承諾
- 後續維護完全免費

## 2️⃣ 六大服務
### 接案
- 網站開發 Web Design
- 軟體開發 Software Dev
  - 客製軟體
  - API 串接
### 自家產品
- 拓荒者 Pioneer（爬蟲）
- 生產者 Producer（AI 內容）⭐
- 追蹤者 Tracker（行為追蹤）
- 建造者 Builder（AI 建站）⭐

## 3️⃣ 四個 AI 產品深挖

### 拓荒者 Pioneer
- 網路爬蟲軟體
- 自定義爬取 / 資料清洗 / 即時更新
- 客戶：房地產 / 講師 / 銀行 / 銷售
- 競品：八爪魚 / Apify
- 推測技術：Python Scrapy / Puppeteer

### 生產者 Producer ⭐
- AI 內容生產系統
- 自動生成部落格 / 產品描述 / 配圖
- Persona 設定
- 客戶：中小企業 / 品牌
- 競品：Jasper / Copy.ai / Notion AI
- 推測技術：LLM API + 圖片生成 + Prompt 工程

### 追蹤者 Tracker
- 網站互動追蹤
- IP / 登錄資料 / Cookie 三大技術
- 客製化內容投放
- 客戶：房地產 / 設計 / 金融 / 講師
- 競品：Hotjar / Mixpanel / GA
- 推測技術：JS SDK + 即時資料儀表板

### 建造者 Builder ⭐
- AI 自動生成網站
- 模板智能建站
- 深度學習持續優化
- 客戶：對網頁設計不熟的企業
- 競品：Wix ADI / Durable / 10Web
- 推測技術：Template Engine + LLM 內容生成

## 4️⃣ AI 工程必會三件事

### LLM 是什麼
- 「下一個字預測機」
- 訓練資料夠大→展現推理能力
- GPT / Claude / Gemini / Llama

### RAG（檢索增強）
- 文件切塊
- 向量化
- 存向量 DB
- 用戶問題 → 找最相似 N 個
- 塞 prompt → LLM 答
- 重點：「翻得準不準」

### AI Agent（ReAct）
- Reason 思考
- Act 行動
- Observe 觀察
- 回到 Reason
- 差別：自己分解步驟

### Prompt Engineering
- 角色 + 範例 + 格式 + 限制
- few-shot / structured output

### Function Calling
- LLM 呼叫工具
- 程式接到後執行
- 結果再給 LLM

## 5️⃣ 面試官 8 大題

### Q1. 為什麼加入？
- 重點：公司強項 + 你的契合
- 「coding 而非套版」「四個 AI 產品」

### Q2. 對四個產品的看法
- 每個產品準備：痛點 + 改進 + 競品

### Q3. 客製 vs 自家產品想做哪
- 短期：客製累積經驗
- 長期：AI 自家產品

### Q4. AI 工具寫程式怎麼看
- 大方承認用 Claude / Cursor
- 「會看懂、會修改、不盲信」

### Q5. 你做過什麼專案
- 誠實但不貶低
- 有：講具體 + 心得
- 沒：講正在做的 side project

### Q6. 處理需求不清楚的客戶
- User story 確認
- Mockup 流程圖
- 分階段交付

### Q7. RAG vs Fine-tuning
- RAG：給 context，模型不變
- Fine-tune：改模型，貴又難維護
- 99% 用 RAG

### Q8. 期望薪水
- 新手 4-5 萬
- 給範圍 + 整體 package

## 6️⃣ 自我介紹 90 秒

### 段 1（10 秒）：身分
- 姓名 / 背景 / 技術方向

### 段 2（30 秒）：技能 + 專案
- 熟悉領域
- 一個具體專案
- 學到什麼

### 段 3（30 秒）⭐：跟工作連結
- 看了公司產品
- 你的相關經驗
- 為什麼合

### 段 4（20 秒）：期望
- 短期目標
- 長期方向

## 7️⃣ 必反問 5 題

### Q1. 工作內容
- 客製 vs 自家產品比例

### Q2. 培訓 / Mentor
- Onboarding 多久
- Mentor 背景

### Q3. 技術棧
- 常用什麼

### Q4. 產品方向
- 哪個產品重押

### Q5. 流程（最後）
- 接下來流程
- 何時收結果

## 8️⃣ 5 個新手必踩雷

### ❌ 沒看公司官網
- ✅ services / agency / 四產品頁

### ❌ 自介講 5 分鐘流水帳
- ✅ 90 秒 4 段

### ❌ 隱瞞用 AI 寫程式
- ✅ 大方承認 + 強調會修

### ❌ 沒準備反問
- ✅ 至少 4 題

### ❌ 期望薪水亂喊
- ✅ 給範圍 + 看 package
