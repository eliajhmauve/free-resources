# NotebookLM 2026

## 一句話定位
### 是什麼
- Google 出的 RAG 工作台
- Gemini 3 驅動
- 只根據你給的 source 回答
- 免費 + 繁中 + 不需訂閱
### 不是什麼
- 不是 ChatGPT 替代品
- 不是創意寫作工具
- 不是探索未知的工具
### 核心定位
- 壓縮你已知資料
- 一份資料七種輸出
- 長期知識庫

## 7 大新功能（2026）
### 1. Cinematic Video Overviews
- 沉浸深度影片
- Gemini 做數百個結構決策
- 流暢動畫 + 視覺豐富
- 社群分享觸及率高 5-10x
### 2. Studio 4-tile 並排
- Audio / Video / Mind Map / Report
- 同 type 可存多個輸出
- 多任務並行（聽 podcast 看 mind map）
### 3. Infographic 10 風格
- Timeline / Comparison / Process
- Statistics / Hierarchy
- 過去只有 auto，現在手選
### 4. EPUB 上傳
- Kindle 書 / O'Reilly 訂閱
- 通勤聽電子書 podcast
### 5. Slide deck 匯 PPTX
- 過去只有 PDF
- 配 2026/02 單頁編輯
- 用 prompt 改文字 / 圖表
### 6. Flashcards / Quizzes 進度
- Got it / Missed it
- 跨 session 保存
- 洗牌 + 只練錯題
### 7. Audio Overview 4 模式
- Deep Dive（兩位主持人）
- Brief（單人 2-3 分鐘）
- Critique（兩位提批評）
- Default

## NLM vs ChatGPT vs Claude
### NLM 強項
- 壓縮已知資料（RAG）
- 多媒體輸出
- 長期專案知識庫
### NLM 弱項
- 探索未知（受 source 限制）
- 創意寫作
### 正確協作方式
- NLM 管知識
- Claude/GPT 管推理
- 透過 MCP 連線

## 5 個 Power User 玩法
### 玩法 1：Topical Authority Clustering
- 每個子主題開獨立 notebook
- 命名「主題 / 子主題」
- 跨庫 reference 找關聯
- 5-10 個 notebook 是健康架構
### 玩法 2：Note-as-Source 壓縮術
- 第一批 source → Briefing Doc
- 存成 Note → 變下一輪 source
- 突破 50 / 300 source 上限
- 處理 100+ 論文必用
### 玩法 3：NLM + Claude（MCP）
- NLM 管知識庫
- Claude 管推理寫作
- MCP 協議直接存取
- 寫文不用每次重貼
### 玩法 4：Deep Research（2025/11）
- 自動跨網路找補充資料
- 從 RAG 進化成 Agentic Researcher
- 適合產業研究 / literature review
### 玩法 5：Public + Cinematic 雙投放
- Notebook public share 給粉絲問
- Cinematic Video 剪短影片發 Reels
- 同一份資料兩個觸及路徑

## 常見踩坑
### API 觸發失敗
- audio / video / slide_deck 高失敗率
- 解法：用 Web UI 手動點 Generate
- UI 觸發成功率 90%+
### Source 還沒處理完就 generate
- 加 source 後等 30-90 秒
- 先在 chat 問問題確認 ready
### Cinematic Video 慢
- 比一般 Video 慢 3-5 倍
- 抓 20-40 分鐘預期
- 別當天才產
### 中文用詞偏大陸
- chat configure 指定繁中台灣口吻
- 明確說「影片」「軟體」不用「視頻」「軟件」
### Source 數爆掉
- 免費 50 / Pro 300 上限
- 用 Note-as-Source 壓縮
- 或開新 notebook 串接

## 適合誰
### 強烈推薦
- 研究者：壓縮論文 / 文獻
- 學生：podcast 聽教科書
- 內容創作者：素材庫 + 多媒體輸出
- 行銷企劃：競品官網拆解
### 一般推薦
- 投資人：研報壓縮 + Critique 批評
- 開發者：技術文檔知識庫
- 講師：教材 → flashcard / quiz
