<script>
(async function() {
  try {
    const resp = await fetch('manifest.json');
    const data = await resp.json();
    const container = document.getElementById('latest-resources');
    const typeLabels = {mindmap:'心智圖',chart:'數據圖表',flowchart:'流程圖',tool:'互動工具'};
    const latest = data.resources.slice(0, 3);

    if (latest.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>資源庫持續更新中</p></div>';
      return;
    }

    container.innerHTML = latest.map(r => `
      <a class="resource-card" href="resources/${r.date}/${r.slug}/${r.file}">
        <div class="resource-card-meta">
          <span class="resource-type">${typeLabels[r.type] || r.type}</span>
          <span class="resource-date">${r.date}</span>
        </div>
        <div class="resource-card-title">${r.title}</div>
        <div class="resource-card-desc">${r.description}</div>
        <div class="resource-card-arrow">→</div>
      </a>
    `).join('');
  } catch(e) {
    console.error('Failed to load resources:', e);
  }
})();
</script>
